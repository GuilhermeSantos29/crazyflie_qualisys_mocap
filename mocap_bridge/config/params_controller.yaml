drone_controller:
  ros__parameters:
    # Nome do drone (deve corresponder ao rigid body no QTM)
    robot_name: "cf231"

    # Trajectória a executar: "square" ou "hover"
    trajectory: "square"

    # Altura de voo em metros
    target_height: 1.0

    # Tamanho do lado do quadrado em metros
    side_length: 1.0

    # Duração do takeoff em segundos
    takeoff_duration: 4.0

    # Tempo de hover antes de iniciar a trajectória em segundos
    hover_duration: 4.0

    # Duração de cada waypoint em segundos
    waypoint_duration: 3.0

    # Duração da aterragem em segundos
    land_duration: 2.5
